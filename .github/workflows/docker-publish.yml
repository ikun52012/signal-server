name: Docker Publish

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  publish-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 5

      - name: Extract Docker metadata
        id: meta_app
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/quantpilot-ai
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-updater:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 5

      - name: Extract updater metadata
        id: meta_updater
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/quantpilot-ai-updater
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push updater
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.updater
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_updater.outputs.tags }}
          labels: ${{ steps.meta_updater.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
