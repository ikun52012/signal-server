<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — QuantPilot AI</title>
    <meta name="theme-color" content="#0f151f">
    <link rel="manifest" href="/static/manifest.json?v=20260504-2">
    <link href="https://fonts.bunny.net/css?family=outfit:500,600,700,800|inter:300,400,500,600" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
:root{
            --bg:#07090d;--card:rgba(15,21,32,.92);--border:rgba(148,163,184,.13);
            --text:#eef4fb;--muted:#9caaba;--blue:#2563eb;--cyan:#0891b2;
            --green:#059669;--red:#e11d48;--gradient:linear-gradient(135deg,#0d9488,#2563eb);
        }
        html{height:100%}
        body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 50% -20%,rgba(37,99,235,.08),transparent 32%),linear-gradient(180deg,#07090d,#090d14 48%,#070a10);color:var(--text);min-height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
        h1,h2,h3{font-family:'Outfit',sans-serif;}
        .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(148,163,184,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.022) 1px,transparent 1px);background-size:40px 40px}
        .bg-glow{display:none}
        .g1,.g2{display:none}
        .auth-container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:40px 36px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 18px 50px rgba(0,0,0,.42);position:relative;overflow:hidden;}
        .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(13,148,136,.42),transparent)}
        .auth-logo{text-align:center;margin-bottom:28px}
        .auth-logo i{font-size:36px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .auth-logo h1{font-size:24px;font-weight:700;margin-top:8px}
        .auth-logo p{color:var(--muted);font-size:14px;margin-top:4px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
        .input-wrap{position:relative}
        .input-wrap i.icon-left{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted)}
        .input-wrap input{width:100%;padding:12px 42px 12px 42px;border-radius:7px;border:1px solid var(--border);background:rgba(8,13,21,.82);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s}
        .input-wrap input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(5,150,105,.13)}
        .input-wrap input::placeholder{color:rgba(136,146,168,.5)}
        .input-wrap .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;line-height:1;transition:color .2s}
        .input-wrap .eye-btn:hover{color:var(--text)}
        .btn-auth{width:100%;padding:13px;border:none;border-radius:7px;background:var(--gradient);color:#031015;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-auth:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(13,148,136,.18)}
        .btn-auth:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
        .auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
        .auth-footer a{color:var(--blue);text-decoration:none;font-weight:600}
        .auth-footer a:hover{text-decoration:underline}
        .error-msg{display:none;padding:10px 14px;border-radius:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--red);font-size:13px;margin-bottom:16px;align-items:center;gap:8px}
        .error-msg.visible{display:flex}
        .success-msg{display:none;padding:10px 14px;border-radius:8px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:var(--green);font-size:13px;margin-bottom:16px;align-items:center;gap:8px}
        .success-msg.visible{display:flex}
        .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;text-decoration:none;margin-bottom:16px;transition:color .2s}
        .back-link:hover{color:var(--text)}
        .pw-hint{font-size:11px;color:var(--muted);margin-top:4px}
    </style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-glow g1"></div><div class="bg-glow g2"></div>
<div class="auth-container">
    <a href="/" class="back-link"><i class="ri-arrow-left-line"></i> Back to Home</a>
    <div class="auth-card">
        <div class="auth-logo">
            <i class="ri-radar-line"></i>
            <h1>Create Account</h1>
            <p>Join QuantPilot AI</p>
        </div>
        <div class="error-msg" id="error-msg"><i class="ri-error-warning-line"></i><span id="error-text"></span></div>
        <div class="success-msg" id="success-msg"><i class="ri-checkbox-circle-line"></i><span id="success-text"></span></div>
        <form id="register-form" autocomplete="on">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <i class="ri-user-3-line icon-left"></i>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3" autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <i class="ri-mail-line icon-left"></i>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <i class="ri-lock-2-line icon-left"></i>
                    <input type="password" id="password" name="password" placeholder="Create a password" required minlength="8" autocomplete="new-password">
                    <button type="button" class="eye-btn" id="toggle-pw" aria-label="Toggle password visibility"><i class="ri-eye-off-line" id="eye-icon"></i></button>
                </div>
                <p class="pw-hint">Minimum 8 characters</p>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-wrap">
                    <i class="ri-lock-check-line icon-left"></i>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required autocomplete="new-password">
                    <button type="button" class="eye-btn" id="toggle-pw2" aria-label="Toggle confirm password visibility"><i class="ri-eye-off-line" id="eye-icon2"></i></button>
                </div>
            </div>
            <div class="form-group" id="invite-group" style="display:none">
                <label for="invite-code">Invite Code</label>
                <div class="input-wrap">
                    <i class="ri-key-2-line icon-left"></i>
                    <input type="text" id="invite-code" name="invite-code" placeholder="Enter invite code">
                </div>
            </div>
            <button type="submit" class="btn-auth" id="btn-register">
                <i class="ri-user-add-line"></i> Create Account
            </button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
<script data-cfasync="false" src="/static/js/i18n.js?v=20260504-2" defer></script>
<script data-cfasync="false">
const form = document.getElementById('register-form');
const errEl = document.getElementById('error-msg');
const errText = document.getElementById('error-text');
const sucEl = document.getElementById('success-msg');
const sucText = document.getElementById('success-text');
const btn = document.getElementById('btn-register');

// Password visibility toggles
function makeEyeToggle(btnId, inputId, iconId) {
    const t = document.getElementById(btnId);
    const i = document.getElementById(inputId);
    const ic = document.getElementById(iconId);
    t.addEventListener('click', () => {
        const vis = i.type === 'text';
        i.type = vis ? 'password' : 'text';
        ic.className = vis ? 'ri-eye-off-line' : 'ri-eye-line';
    });
}
makeEyeToggle('toggle-pw', 'password', 'eye-icon');
makeEyeToggle('toggle-pw2', 'confirm-password', 'eye-icon2');

fetch('/api/registration-settings')
    .then(r => r.json())
    .then(data => {
        if (data.invite_required) {
            document.getElementById('invite-group').style.display = 'block';
            document.getElementById('invite-code').required = true;
        }
    })
    .catch(() => {});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.classList.remove('visible');
    sucEl.classList.remove('visible');

    const pw = document.getElementById('password').value;
    const pw2 = document.getElementById('confirm-password').value;
    if (pw !== pw2) {
        errText.textContent = 'Passwords do not match';
        errEl.classList.add('visible');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="ri-loader-4-line"></i> Creating account...';

    try {
        const resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: pw,
                invite_code: document.getElementById('invite-code').value,
            }),
        });
        const data = await resp.json();

        if (!resp.ok) {
            throw new Error(data.detail || 'Registration failed');
        }

        // Token stored in httpOnly cookie — no localStorage needed
        sucText.textContent = 'Account created! Redirecting...';
        sucEl.classList.add('visible');
        setTimeout(() => { window.location.replace('/dashboard'); }, 1000);
    } catch (err) {
        errText.textContent = err.message;
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-user-add-line"></i> Create Account';
    }
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/', updateViaCache: 'none' }).catch(() => {});
    });
}
</script>
</body>
</html>
